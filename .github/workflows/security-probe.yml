name: Security probe (production)

# Runs a lightweight DAST pass against the live marketing site. Fails the
# workflow if the home page is unhealthy or if any blocklisted path returns a
# non-404 response. Complements the runtime Worker blocklist in src/index.js.

on:
  schedule:
    - cron: '17 8 * * *'   # 08:17 UTC daily — off-peak, non-round-minute
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: security-probe
  cancel-in-progress: false

jobs:
  probe:
    name: Probe production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DOMAIN: www.districtdesk.org
      MARKER: DistrictDesk
      UA: GitHubActions-SecurityProbe/1.0
    steps:
      - name: Home page alive + analytics present
        run: |
          set -eo pipefail
          code=$(curl -sL -o /tmp/body -w "%{http_code}" -A "$UA" "https://$DOMAIN/")
          if [ "$code" != "200" ]; then
            echo "::error::Home page returned $code (expected 200)"
            exit 1
          fi
          grep -q "$MARKER" /tmp/body || { echo "::error::Marker '$MARKER' missing from home"; exit 1; }
          grep -q "clarity.ms/tag" /tmp/body || { echo "::error::Clarity analytics snippet missing from home"; exit 1; }
          grep -q "googletagmanager.com/gtag" /tmp/body || { echo "::error::GA4 snippet missing from home"; exit 1; }
          echo "Home OK (HTTP 200, marker + analytics present)"

      - name: Exposure paths must return 404
        run: |
          FAIL=0
          for path in \
            ".git/HEAD" ".git/config" ".git/index" ".git/logs/HEAD" \
            ".git/refs/heads/main" ".git/packed-refs" \
            ".wrangler/tmp/x" ".wrangler/state/x" \
            ".github/workflows/security-probe.yml" \
            ".vscode/settings.json" ".idea/workspace.xml" \
            "src/index.js" "node_modules/x" \
            "wrangler.toml" "wrangler.jsonc" \
            "package.json" "package-lock.json" "yarn.lock" "pnpm-lock.yaml" \
            ".env" ".env.local" ".env.production" ".env.development" \
            ".gitignore" ".dockerignore" "Dockerfile" "docker-compose.yml" \
            "tsconfig.json" "vite.config.js" "webpack.config.js"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -A "$UA" "https://$DOMAIN/$path")
            if [ "$code" = "200" ]; then
              echo "::error::/$path returned 200 (expected 404) — EXPOSURE"
              FAIL=1
            elif [ "$code" != "404" ]; then
              echo "::warning::/$path returned $code (expected 404)"
            fi
          done
          exit $FAIL
